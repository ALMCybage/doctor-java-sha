name: CD - SonarQube, Docker Build, Trivy Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package --batch-mode
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-build:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t appointment-service:${{ github.sha }} .
      - name: Save Docker image to tar
        run: docker save appointment-service:${{ github.sha }} -o appointment-service.tar
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: appointment-service.tar

  trivy-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: docker load -i appointment-service.tar
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: appointment-service:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
      - name: Upload Trivy scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy_report.txt
